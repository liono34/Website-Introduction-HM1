<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Car - CarHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background: #2c3e50;
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }
        .nav-links a:hover {
            color: #3498db;
        }
        .container {
            width: 90%;
            max-width: 700px;
            margin: 40px auto;
            padding: 25px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .title {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        .submit-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        .submit-btn:hover {
            background: #2980b9;
        }
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .nav-links {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">CarHub</div>
        <div class="nav-links">
            <a href="home.html">Home</a >
            <a href="seller.html">Seller Center</a >
            <a href="register.html">Register</a >
            <a href="login.html">Login</a >
            <a href="add-car.html">Add Car</a >
            <a href="search.html">Search Car</a >
        </div>
    </div>

    <div class="container">
        <h2 class="title">Add Car Information</h2>
        <form id="addCarForm" onsubmit="return validateForm()">
            <div class="form-group">
                <label>Car Color</label>
                <input type="text" id="color" placeholder="Enter car color" required>
            </div>

            <div class="form-group">
                <label>Car Model</label>
                <input type="text" id="model" placeholder="e.g. Toyota Camry" required>
            </div>

            <div class="form-group">
                <label>Manufacture Year</label>
                <input type="number" id="year" placeholder="e.g. 2020" min="1900" max="2025" required>
            </div>

            <div class="form-group">
                <label>Car Location</label>
                <input type="text" id="location" placeholder="e.g. New York" required>
            </div>

            <div class="form-group">
                <label>Price (USD)</label>
                <input type="number" id="price" placeholder="Enter car price" min="1" required>
            </div>

            <div class="form-group">
                <label>Upload Car Image</label>
                <input type="file" id="carImage" accept="image/*" required>
            </div>

            <button type="submit" class="submit-btn">Submit Car Information</button>
        </form>
    </div>

    <script>
        function validateForm() {
            const year = document.getElementById('year').value;
            const price = document.getElementById('price').value;
            
            if(year < 1900 || year > 2025) {
                alert('Please enter a valid year!');
                return false;
            }
            if(price <= 0) {
                alert('Price must be greater than 0!');
                return false;
            }
            alert('Car information added successfully!');
            return true;
        }
    </script>
</body>
</html>
